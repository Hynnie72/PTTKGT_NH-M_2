name: Auto Commit Demo

on:
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Lấy code từ repository
        uses: actions/checkout@v4

      - name: Tạo file log thời gian
        run: |
          echo "Cập nhật lúc: $(date)" >> update_log.txt

      - name: Commit và push thay đổi
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Tự động commit từ GitHub Actions"
